<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .joke-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .joke-text {
            color: white;
            font-size: 1.3em;
            text-align: center;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-setup {
            margin-bottom: 15px;
            font-style: italic;
        }

        .punchline {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .loading {
            text-align: center;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-get-joke {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-get-joke:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-get-joke:active {
            transform: translateY(0);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-copy:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        .btn-copy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .category-filter {
            margin-bottom: 20px;
        }

        .category-filter label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .category-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .category-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .category-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3a3;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #3a3;
            text-align: center;
        }

        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: #666;
            font-size: 0.95em;
        }

        .stats span {
            font-weight: 600;
            color: #667eea;
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .joke-text {
                font-size: 1.1em;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh!</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">Copied to clipboard!</div>

        <div class="category-filter">
            <label>Select Category (Optional):</label>
            <div class="category-buttons">
                <button class="category-btn active" data-category="any">Any</button>
                <button class="category-btn" data-category="general">General</button>
                <button class="category-btn" data-category="programming">Programming</button>
                <button class="category-btn" data-category="knock-knock">Knock-Knock</button>
                <button class="category-btn" data-category="dad">Dad Jokes</button>
            </div>
        </div>

        <div class="joke-display" id="jokeDisplay">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading a joke for you...</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-get-joke" onclick="getJoke()">Get New Joke</button>
            <button class="btn-copy" id="copyBtn" onclick="copyJoke()" disabled>Copy Joke</button>
        </div>

        <div class="stats">
            Jokes loaded: <span id="jokeCount">0</span>
        </div>
    </div>

    <script>
        let currentJoke = null;
        let selectedCategory = 'any';
        let jokeCount = 0;

        // Category button event listeners
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedCategory = this.dataset.category;
            });
        });

        async function getJoke() {
            const jokeDisplay = document.getElementById('jokeDisplay');
            const errorMessage = document.getElementById('errorMessage');
            const copyBtn = document.getElementById('copyBtn');

            // Show loading state
            jokeDisplay.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading a joke for you...</p>
                </div>
            `;
            errorMessage.style.display = 'none';
            copyBtn.disabled = true;

            try {
                let url = 'https://v2.jokeapi.dev/joke/';

                // Build category URL
                if (selectedCategory === 'any') {
                    url += 'Any';
                } else if (selectedCategory === 'programming') {
                    url += 'Programming';
                } else if (selectedCategory === 'knock-knock') {
                    url += 'Knock-Knock';
                } else {
                    url += 'General';
                }

                // Add parameters
                url += '?type=single,twopart&format=json';

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('No jokes found for this category');
                }

                currentJoke = data;
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;

                displayJoke(data);
                copyBtn.disabled = false;

            } catch (error) {
                console.error('Error fetching joke:', error);
                errorMessage.textContent = `Error: ${error.message}. Please try again.`;
                errorMessage.style.display = 'block';
                jokeDisplay.innerHTML = `
                    <div class="joke-text">
                        <p>Oops! Could not load a joke. Please try again.</p>
                    </div>
                `;
                currentJoke = null;
                copyBtn.disabled = true;
            }
        }

        function displayJoke(joke) {
            const jokeDisplay = document.getElementById('jokeDisplay');
            let jokeHTML = '<div class="joke-text">';

            if (joke.type === 'twopart') {
                jokeHTML += `
                    <div class="joke-setup">${escapeHtml(joke.setup)}</div>
                    <div class="punchline">${escapeHtml(joke.delivery)}</div>
                `;
            } else {
                jokeHTML += `<div>${escapeHtml(joke.joke)}</div>`;
            }

            jokeHTML += '</div>';
            jokeDisplay.innerHTML = jokeHTML;
        }

        function copyJoke() {
            if (!currentJoke) return;

            let jokeText = '';
            if (currentJoke.type === 'twopart') {
                jokeText = `${currentJoke.setup}\n\n${currentJoke.delivery}`;
            } else {
                jokeText = currentJoke.joke;
            }

            navigator.clipboard.writeText(jokeText).then(() => {
                const successMessage = document.getElementById('successMessage');
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy joke to clipboard');
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load first joke on page load
        window.addEventListener('load', getJoke);
    </script>

</body>
</html>
